<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrandSnap AI - Generate Flyers</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #0e0e0e;
        color: #f0f0f0;
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .container {
        width: 100%;
        max-width: 560px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 2.5rem;
      }

      .brand-logo {
        width: 36px;
        height: 36px;
        background-color: #c8ff00;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .brand-logo svg {
        width: 20px;
        height: 20px;
      }

      .brand-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: #f0f0f0;
        letter-spacing: -0.02em;
      }

      .header {
        margin-bottom: 2rem;
      }

      .header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #f0f0f0;
        letter-spacing: -0.03em;
        line-height: 1.2;
        margin-bottom: 0.5rem;
      }

      .header h1 span {
        color: #c8ff00;
      }

      .header p {
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        color: #555;
        line-height: 1.6;
      }

      .card {
        background-color: #141414;
        border: 1px solid #222;
        border-radius: 16px;
        padding: 2rem;
      }

      .form-row {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #aaa;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      input[type="text"],
      textarea {
        width: 100%;
        background-color: #0e0e0e;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        color: #f0f0f0;
        font-family: "DM Mono", monospace;
        font-size: 0.88rem;
        padding: 0.75rem 1rem;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus,
      textarea:focus {
        border-color: #c8ff00;
      }

      input[type="text"]::placeholder,
      textarea::placeholder {
        color: #3a3a3a;
      }

      textarea {
        resize: vertical;
        min-height: 100px;
        line-height: 1.6;
      }

      .divider {
        height: 1px;
        background-color: #1e1e1e;
        margin: 1.5rem 0;
      }

      .submit-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.9rem;
        background-color: #c8ff00;
        color: #0e0e0e;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
      }

      .submit-btn:hover {
        opacity: 0.88;
      }

      .submit-btn:active {
        transform: scale(0.99);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .submit-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(14, 14, 14, 0.3);
        border-top-color: #0e0e0e;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .footer-note {
        text-align: center;
        margin-top: 1.2rem;
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: #3a3a3a;
      }

      .footer-note a {
        color: #555;
        text-decoration: none;
        border-bottom: 1px solid #333;
      }

      .footer-note a:hover {
        color: #c8ff00;
        border-bottom-color: #c8ff00;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/" class="brand" style="text-decoration:none;">
        <div class="brand-logo">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="7" height="7" rx="2" fill="#0e0e0e" />
            <rect x="11" y="2" width="7" height="7" rx="2" fill="#0e0e0e" />
            <rect x="2" y="11" width="7" height="7" rx="2" fill="#0e0e0e" />
            <circle cx="14.5" cy="14.5" r="3.5" fill="#0e0e0e" />
          </svg>
        </div>
        <span class="brand-name">BrandSnap AI</span>
      </a>

      <div class="header">
        <h1>Generate <span>5 Flyers</span></h1>
        <p>We'll create 5 ad flyers in different styles using DALL-E 3.<br/>This takes around 15–30 seconds.</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div style="background:#1a0000;border:1px solid #ff4444;color:#ff4444;font-family:'DM Mono',monospace;font-size:0.75rem;padding:0.8rem 1.2rem;border-radius:10px;margin-bottom:1.2rem;">
          {{ message }}
        </div>
        {% endfor %}
      {% endwith %}

      <div class="card">
        <form method="POST" action="/generate-flyers" id="flyer-form">
          <div class="form-row">
            <label for="brand">Brand name</label>
            <input
              type="text"
              id="brand_name"
              name="brand_name"
              placeholder="e.g. Sunny Bakery"
              required
            />
          </div>

          <div class="form-row">
            <label for="audience">Target audience</label>
            <input
              type="text"
              id="target_audience"
              name="target_audience"
              placeholder="e.g. Young professionals aged 25-35"
              required
            />
          </div>

          <div class="divider"></div>

          <div class="form-row">
            <label for="business_details">Business details / promo info</label>
            <textarea
              id="business_details"
              name="business_details"
              placeholder="e.g. 20% off all pastries this weekend, cozy neighborhood café known for artisan coffee"
              required
            ></textarea>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="spinner" id="spinner"></span>
            <span id="btn-text">Generate 5 Flyers</span>
            <svg id="btn-arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M3 8h10M9 4l4 4-4 4"
                stroke="#0e0e0e"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </form>
      </div>

      <p class="footer-note">
        <a href="/dashboard">Back to dashboard</a>
      </p>
    </div>

    <script>
      document.getElementById('flyer-form').addEventListener('submit', function() {
        var btn     = document.getElementById('submit-btn');
        var spinner = document.getElementById('spinner');
        var text    = document.getElementById('btn-text');
        var arrow   = document.getElementById('btn-arrow');

        btn.disabled      = true;
        spinner.style.display = 'block';
        text.textContent  = 'Generating... (this may take ~30 seconds)';
        arrow.style.display = 'none';
      });
    </script>
  </body>
</html>
